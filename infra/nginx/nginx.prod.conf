# Required by nginx even if no special event handling is needed.
events {}

http {
  # ── Rate limiting zones ───────────────────────────────────────────────────
  # Defined here (http block) so they are shared across all server blocks.
  # $binary_remote_addr stores the client IP in binary form (4 bytes for IPv4,
  # 16 for IPv6) — more memory-efficient than the plain string $remote_addr.
  # A 10m zone holds ~160,000 unique IPs before evicting the oldest entries.
  #
  # Limits are taken directly from the V1 rate-limiting spec (docs/):
  #   - Create:   10 requests / minute per IP  (burst of 5 queued)
  #   - Redirect: 200 requests / second per IP (burst of 50 queued)
  #
  # `nodelay` on each location means burst requests are served immediately
  # rather than queued/delayed — excess beyond the burst is rejected with 429.
  limit_req_zone $binary_remote_addr zone=create_limit:10m   rate=10r/m;
  limit_req_zone $binary_remote_addr zone=redirect_limit:10m rate=200r/s;

  # Return 429 Too Many Requests instead of nginx's default 503.
  limit_req_status 429;

  # ── Upstream ──────────────────────────────────────────────────────────────
  # Docker's internal DNS resolves the service name `backend` to the
  # Spring Boot container IP automatically — no hardcoded IPs needed.
  # The Angular SPA is NOT proxied here; it is served by S3 + CloudFront
  # (see ADR-006). This nginx only handles API calls and short-code redirects.
  upstream backend_upstream {
    server backend:8080;
  }

  # ── Server 1: HTTP → HTTPS redirect ──────────────────────────────────────
  # Catches all plain-HTTP traffic and issues a permanent redirect.
  # The 301 tells browsers and search engines to always use HTTPS going forward.
  server {
    listen 80;
    server_name go.buffden.com;
    return 301 https://$host$request_uri;
  }

  # ── Server 2: HTTPS (main entrypoint) ────────────────────────────────────
  server {
    listen 443 ssl;
    server_name go.buffden.com;

    # ── TLS certificates (Let's Encrypt) ─────────────────────────────────
    # Cert files live on the host at /etc/letsencrypt and are bind-mounted
    # into this container as read-only (see docker-compose.prod.yml).
    # Certbot renews them automatically; a post-renewal hook reloads nginx.
    ssl_certificate     /etc/letsencrypt/live/go.buffden.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/go.buffden.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;   # drop older, insecure TLS versions

    # ── Route 1: REST API → Spring Boot ──────────────────────────────────
    # All /api/* calls from the Angular SPA are forwarded to the backend.
    # Rate limited to 10 req/min per IP with a burst of 5 (V1 spec).
    # X-Forwarded-Proto: https tells Spring Boot the original request was
    # secure, so it generates https:// short URLs in API responses.
    location /api/ {
      limit_req zone=create_limit burst=5 nodelay;

      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Route 2: Health check → Spring Boot ──────────────────────────────
    # Exposes only the health endpoint publicly — not /metrics or other
    # actuator endpoints (those are restricted in application-prod.yaml).
    # No rate limit applied; health checks must always get through.
    location /actuator/health {
      proxy_pass http://backend_upstream;
    }

    # ── Route 3: Short code redirects → Spring Boot ───────────────────────
    # Regex matches any root-level path that looks like a short code:
    # 4–32 characters, alphanumeric plus _ and -.
    # This mirrors the DB check constraint on the short_code column exactly.
    # Spring Boot resolves the code and issues the 301/302 to the original URL.
    # Rate limited to 200 req/s per IP with a burst of 50 (V1 spec).
    #
    # NOTE: In nginx, regex locations (~) take priority over the prefix
    # location (/), so short codes are never accidentally routed elsewhere.
    location ~ ^/[0-9a-zA-Z_-]{4,32}$ {
      limit_req zone=redirect_limit burst=50 nodelay;

      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
    }

    # ── No catch-all location / ───────────────────────────────────────────
    # The Angular SPA is served entirely by CloudFront backed by an S3 bucket
    # (ADR-006). CloudFront sits in front of this nginx and routes SPA traffic
    # directly to S3, so requests for / and Angular routes never reach here.
    # Any unmatched path returns nginx's default 404.
  }
}
