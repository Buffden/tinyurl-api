spring:
  application:
    name: tinyurl
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tinyurl}
    username: ${SPRING_DATASOURCE_USERNAME:tinyurl}
    password: ${SPRING_DATASOURCE_PASSWORD:tinyurl}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health

tinyurl:
  base-url: ${TINYURL_BASE_URL:http://localhost}
  default-expiry-days: ${TINYURL_DEFAULT_EXPIRY_DAYS:180}
  short-code-min-length: ${TINYURL_SHORT_CODE_MIN_LENGTH:6}

