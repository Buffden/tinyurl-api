spring:
  application:
    name: tinyurl
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tinyurl}
    username: ${SPRING_DATASOURCE_USERNAME:tinyurl}
    password: ${SPRING_DATASOURCE_PASSWORD:tinyurl}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health

